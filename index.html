<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon</title>
    <link rel="stylesheet" href="<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
     <div class="navbar">
            <div class="logo border"></div>
            <div class="amazon image"></div>
        </div>
        <div class="deliver border">
            <div class="map-icon"><i class="fa-solid fa-location-dot"></i></div>
            <span class="del">Deliver To</span><br>
            <span class="india">India</span>
        </div>
        <div class="search">
            <div class="all">All</div>
            <input type="search" placeholder="search Amazon.in" class="search-input">
            <div class="searc-icon"><i class="fa-solid fa-magnifying-glass"></i></div>
        </div>
        <div class="lang border">
            <div class="img"></div>
            <div class="en">EN</div>
        <div>
            <div class="sign boader"></div>
            <p class="hello">Hello, Signin</p>
            <p class="ac">Account & lists</p>
        </div>
        <div class="sign border">
            <p class="hello">Returns</p>
            <p class="ac">& orders</p>
        </div>
        <div class="cart border">
            <div class="cart icon"><i class="fa-solid fa-cart-shopping"></i></div>
            <div class="cart text">Cart</div>
        </div>
    </div>
    <div class="ops_bar">
        <div class="ops_all border"><i class="fa-solid fa-bars"></i>All</div>
        <div class="ops">
            <p class="border">Fresh</p>
            <p class="border">MX player</p>
            <p class="border">sell</p>
            <p class="border">best seller</p>
            <p class="border">mobiles</p>
            <p class="border">today's deal</p>
            <p class="border">customer service</p>
            <p class="border">new releases</p>
            <p class="border">Prime</p>
        </div>
        <div class="syari border"></div>
    </div>
    </header>
</body>
</html>
